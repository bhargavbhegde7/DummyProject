name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      # Build Maven project
      - name: Build Project
        run: mvn clean install

      # Upload JAR Artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dummyproject-jar
          path: target/DummyProject-1.0-SNAPSHOT.jar
          retention-days: 30

      # Generate build version
      - name: Generate Version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "LATEST=latest" >> $GITHUB_ENV

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and Push Docker image with docker/build-push-action
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            goodbytes/dummy-project:${{ env.VERSION }}
            goodbytes/dummy-project:latest

      # Update k8s Deployment with new image
      - name: Update k8s Deployment
        run: |
          sed -i "s|image: goodbytes/dummy-project:.*|image: goodbytes/dummy-project:${{ env.VERSION }}|g" k8s/deployment.yaml

      # Create Git tag
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${VERSION}
          git push origin ${VERSION}

      # Commit k8s deployment changes
      - name: Commit k8s Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update k8s deployment image to ${{ env.VERSION }}" || echo "No changes to commit"
          git push

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Automated release for ${{ env.VERSION }}

            Docker Image Tags:
            - Versioned: docker pull goodbytes/dummy-project:${{ env.VERSION }}
            - Latest: docker pull goodbytes/dummy-project:latest

            Build Number: ${{ github.run_number }}

            K8s Deployment automatically updated to ${{ env.VERSION }}
          files: target/DummyProject-1.0-SNAPSHOT.jar
